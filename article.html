<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EmergencyFundGuides Article</title>
  <meta name="description" content="" id="metaDescription" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --paper: #faf8f3;
      --paper-2: #f3f0e7;
      --paper-3: #ebe7da;
      --ink: #151614;
      --ink-2: #3c3d39;
      --ink-3: #76766f;
      --rule: #d9d4c4;
      --accent: #1a3a6e;
      --accent-2: #2451a0;
      --accent-soft: #e4eaf5;
      --cta: #d4820a;
      --cta-hover: #e8950f;
      --green: #15803d;
      --green-light: #f0fdf4;
      --blue-light: #eff6ff;
      --red: #b91c1c;
      --red-light: #fef2f2;
      --serif: 'Instrument Serif', Georgia, serif;
      --sans: 'Plus Jakarta Sans', system-ui, sans-serif;
      --mono: 'JetBrains Mono', monospace;
      --container: 1180px;
      --radius: 4px;
      --radius-lg: 10px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--sans);
      background: var(--paper);
      color: var(--ink);
      line-height: 1.65;
      font-size: 17px;
      -webkit-font-smoothing: antialiased;
    }

    a { color: inherit; }

    .site-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(250, 248, 243, 0.95);
      border-bottom: 1px solid var(--rule);
      backdrop-filter: blur(12px);
    }

    .nav {
      max-width: var(--container);
      margin: 0 auto;
      padding: 0 28px;
      height: 68px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      color: var(--ink);
    }

    .brand-mark {
      width: 30px;
      height: 30px;
      border-radius: 6px;
      background: var(--accent);
      color: var(--paper);
      display: grid;
      place-items: center;
      font-family: var(--serif);
      font-size: 20px;
      font-style: italic;
      line-height: 1;
    }

    .brand-name {
      font-family: var(--serif);
      font-size: 22px;
      line-height: 1;
      letter-spacing: -0.01em;
    }

    .brand-name .amp {
      font-style: italic;
      color: var(--accent);
    }

    .nav-cta {
      background: var(--accent);
      color: var(--paper);
      padding: 10px 18px;
      border-radius: var(--radius);
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
    }

    .page-shell {
      max-width: 820px;
      margin: 0 auto;
      padding: 0 24px 72px;
    }

    .breadcrumb {
      font-size: 13px;
      color: var(--ink-3);
      padding: 28px 0 12px;
    }

    .breadcrumb a {
      color: var(--accent);
      text-decoration: none;
    }

    .breadcrumb span {
      margin: 0 8px;
      color: var(--ink-3);
    }

    .article-header {
      padding: 28px 0 24px;
      border-bottom: 1px solid var(--rule);
      margin-bottom: 32px;
    }

    .article-tag {
      display: inline-block;
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
      background: var(--accent-soft);
      padding: 7px 12px;
      border-radius: 999px;
      margin-bottom: 18px;
    }

    h1 {
      font-family: var(--serif);
      font-size: clamp(38px, 6vw, 68px);
      font-weight: 400;
      line-height: 1.02;
      letter-spacing: -0.018em;
      color: var(--ink);
      margin-bottom: 16px;
    }

    .article-meta {
      display: flex;
      gap: 18px;
      flex-wrap: wrap;
      font-size: 13px;
      color: var(--ink-3);
    }

    .article-meta .updated {
      color: var(--green);
      font-weight: 600;
    }

    .article-body p {
      margin-bottom: 18px;
      color: var(--ink-2);
      font-size: 17px;
    }

    .article-body h2 {
      font-family: var(--serif);
      font-size: clamp(30px, 4vw, 42px);
      font-weight: 400;
      line-height: 1.1;
      letter-spacing: -0.015em;
      color: var(--ink);
      margin: 44px 0 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--rule);
    }

    .article-body h3 {
      font-size: 20px;
      margin: 28px 0 10px;
      color: var(--ink);
    }

    .quick-answers {
      background: var(--blue-light);
      border: 1px solid #dbeafe;
      border-left: 4px solid var(--accent);
      border-radius: var(--radius-lg);
      padding: 22px 24px;
      margin: 28px 0 34px;
    }

    .quick-answers-label {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 12px;
    }

    .quick-answers ul {
      list-style: none;
    }

    .quick-answers li {
      padding: 8px 0 8px 22px;
      position: relative;
      color: var(--ink-2);
      border-bottom: 1px solid #dbeafe;
    }

    .quick-answers li:last-child { border-bottom: none; }

    .quick-answers li::before {
      content: "→";
      position: absolute;
      left: 0;
      color: var(--accent);
      font-weight: 700;
    }

    .definition-box {
      background: #f5f3ff;
      border-left: 4px solid #6d28d9;
      border-radius: var(--radius-lg);
      padding: 16px 18px;
      margin: 24px 0;
      color: #3b1f8c;
      font-size: 15px;
    }

    .definition-box strong {
      color: #6d28d9;
    }

    .cta-box {
      background: #fffbeb;
      border: 1px solid #fbbf24;
      border-radius: var(--radius-lg);
      padding: 28px;
      margin: 36px 0;
      text-align: center;
    }

    .cta-headline {
      font-family: var(--serif);
      font-size: 30px;
      line-height: 1.1;
      margin-bottom: 10px;
      color: var(--ink);
    }

    .cta-body {
      max-width: 560px;
      margin: 0 auto 20px;
      color: var(--ink-2);
    }

    .cta-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--cta);
      color: var(--paper);
      padding: 14px 24px;
      border-radius: var(--radius);
      font-weight: 700;
      text-decoration: none;
    }

    .cta-btn:hover {
      background: var(--cta-hover);
    }

    .faq-item {
      border: 1px solid var(--rule);
      border-radius: var(--radius-lg);
      margin-bottom: 12px;
      overflow: hidden;
      background: var(--paper-2);
    }

    .faq-q {
      width: 100%;
      background: transparent;
      border: none;
      padding: 18px 20px;
      text-align: left;
      font-family: var(--sans);
      font-size: 16px;
      font-weight: 700;
      color: var(--ink);
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      gap: 16px;
    }

    .faq-a {
      display: none;
      padding: 0 20px 18px;
      border-top: 1px solid var(--rule);
    }

    .faq-a.open {
      display: block;
    }

    .faq-short {
      background: var(--green-light);
      border-left: 3px solid var(--green);
      padding: 10px 14px;
      border-radius: var(--radius);
      margin: 16px 0 12px;
      color: #14532d;
      font-size: 14px;
    }

    .conclusion {
      background: var(--accent);
      color: var(--paper);
      border-radius: var(--radius-lg);
      padding: 30px;
      margin: 40px 0 28px;
    }

    .conclusion h2 {
      color: var(--paper);
      border-bottom-color: rgba(255,255,255,0.18);
      margin-top: 0;
    }

    .conclusion p {
      color: rgba(250,248,243,0.84);
    }

    .compliance-footer {
      background: var(--paper-2);
      border: 1px solid var(--rule);
      border-radius: var(--radius-lg);
      padding: 20px;
      font-size: 12.5px;
      color: var(--ink-3);
      line-height: 1.6;
    }

    .site-footer {
      border-top: 1px solid var(--rule);
      padding: 28px;
      text-align: center;
      color: var(--ink-3);
      font-size: 13px;
    }

    .not-found {
      text-align: center;
      padding: 80px 20px;
    }

    @media (max-width: 640px) {
      .nav {
        padding: 0 20px;
      }

      .brand-name {
        font-size: 19px;
      }

      .nav-cta {
        display: none;
      }

      .page-shell {
        padding: 0 20px 56px;
      }
    }
  </style>
</head>

<body>
  <header class="site-header">
    <nav class="nav">
      <a href="/" class="brand">
        <span class="brand-mark">e</span>
        <span class="brand-name">EmergencyFund<span class="amp">·</span>Guides</span>
      </a>
      <a href="/#calculator" class="nav-cta">Start free analysis</a>
    </nav>
  </header>

  <main class="page-shell" id="articlePage">
    <div class="not-found">Loading article...</div>
  </main>

  <footer class="site-footer">
    © 2026 EmergencyFundGuides. All rights reserved.
  </footer>

  <script>
    function escapeHtml(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function getSlug() {
      const params = new URLSearchParams(window.location.search);
      return params.get("slug") || window.location.pathname.split("/").filter(Boolean).pop();
    }

    function renderBlocks(blocks) {
      return (blocks || []).map(block => {
        if (block.type === "p") {
          return `<p>${escapeHtml(block.text)}</p>`;
        }

        if (block.type === "h2") {
          return `<h2>${escapeHtml(block.text)}</h2>`;
        }

        if (block.type === "h3") {
          return `<h3>${escapeHtml(block.text)}</h3>`;
        }

        if (block.type === "quickAnswers") {
          const items = (block.items || []).map(item => `<li>${escapeHtml(item)}</li>`).join("");
          return `
            <div class="quick-answers">
              <div class="quick-answers-label">Quick answers</div>
              <ul>${items}</ul>
            </div>
          `;
        }

        if (block.type === "definition") {
          return `
            <div class="definition-box">
              <strong>${escapeHtml(block.label)}:</strong> ${escapeHtml(block.text)}
            </div>
          `;
        }

        if (block.type === "cta") {
          return `
            <div class="cta-box">
              <div class="cta-headline">${escapeHtml(block.headline)}</div>
              <p class="cta-body">${escapeHtml(block.body)}</p>
              <a href="${escapeHtml(block.buttonUrl || "/#calculator")}" class="cta-btn">${escapeHtml(block.buttonText || "See Your Options Free →")}</a>
            </div>
          `;
        }

        if (block.type === "faq") {
          return (block.items || []).map(item => `
            <div class="faq-item">
              <button class="faq-q" aria-expanded="false" onclick="toggleFaq(this)">
                ${escapeHtml(item.q)}
                <span>▾</span>
              </button>
              <div class="faq-a">
                <div class="faq-short"><strong>Quick answer:</strong> ${escapeHtml(item.short)}</div>
                <p>${escapeHtml(item.a)}</p>
              </div>
            </div>
          `).join("");
        }

        if (block.type === "conclusion") {
          return `
            <div class="conclusion">
              <h2>${escapeHtml(block.title)}</h2>
              <p>${escapeHtml(block.text)}</p>
            </div>
          `;
        }

        if (block.type === "disclosure") {
          return `
            <div class="compliance-footer">
              <strong>Disclosure</strong><br>
              ${escapeHtml(block.text)}
            </div>
          `;
        }

        return "";
      }).join("");
    }

    function toggleFaq(btn) {
      const expanded = btn.getAttribute("aria-expanded") === "true";

      document.querySelectorAll(".faq-q").forEach(function(item) {
        item.setAttribute("aria-expanded", "false");
        item.nextElementSibling.classList.remove("open");
      });

      if (!expanded) {
        btn.setAttribute("aria-expanded", "true");
        btn.nextElementSibling.classList.add("open");
      }
    }

    async function loadArticle() {
      const slug = getSlug();
      const page = document.getElementById("articlePage");

      try {
        const response = await fetch("/articles.json");
        const articles = await response.json();
        const article = articles.find(item => item.slug === slug);

        if (!article) {
          page.innerHTML = `
            <div class="not-found">
              <h1>Article not found</h1>
              <p>This article does not exist yet.</p>
              <p><a href="/">Go back home</a></p>
            </div>
          `;
          return;
        }

        document.title = article.title;
        document.getElementById("metaDescription").setAttribute("content", article.description || article.excerpt || "");

        page.innerHTML = `
          <nav class="breadcrumb" aria-label="Breadcrumb">
            <a href="/">Home</a>
            <span>›</span>
            <a href="/#resources">Guides</a>
            <span>›</span>
            ${escapeHtml(article.category || "Article")}
          </nav>

          <header class="article-header">
            <div class="article-tag">${escapeHtml(article.category || "Guide")}</div>
            <h1>${escapeHtml(article.title)}</h1>
            <div class="article-meta">
              <span class="updated">✓ ${escapeHtml(article.updated || "")}</span>
              <span>${escapeHtml(article.author || "EmergencyFundGuides.com")}</span>
              <span>${escapeHtml(article.readTime || "")}</span>
            </div>
          </header>

          <article class="article-body">
            ${renderBlocks(article.blocks)}
          </article>
        `;
      } catch (error) {
        page.innerHTML = `
          <div class="not-found">
            <h1>Unable to load article</h1>
            <p>Please check articles.json file.</p>
          </div>
        `;
      }
    }

    loadArticle();
  </script>
</body>
</html>
